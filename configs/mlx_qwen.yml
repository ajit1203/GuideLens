model:
  model_name: mlx-community/Qwen2.5-VL-3B-Instruct-4bit

data:
  dataset_dir: data/processed/mlx_vizwiz_qwen_ds

training:
  output_adapter: checkpoints/mlx_qwen25vl_adapter.safetensors
  batch_size: 1
  epochs: 1
  learning_rate: 2e-4
  lora_rank: 8
  lora_alpha: 16
  gradient_accumulation_steps: 4

inference:
  max_tokens: 64